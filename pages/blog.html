<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Instagram Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            color: #0095f6;
        }
        .blog-post {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .blog-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .blog-meta {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1><i class="fas fa-blog"></i> Blog</h1>
        </div>
        <div class="blog-post">
            <div class="blog-title">How to Grow Your Instagram in 2026</div>
            <div class="blog-meta">Posted on March 1, 2026</div>
            <p>Tips and tricks to increase your Instagram followers organically...</p>
        </div>
        <div class="blog-post">
            <div class="blog-title">Blue Tick Verification Guide</div>
            <div class="blog-meta">Posted on February 15, 2026</div>
            <p>Everything you need to know about getting verified on Instagram...</p>
        </div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
