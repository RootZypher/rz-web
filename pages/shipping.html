<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Policy - Instagram Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            color: #0095f6;
        }
        .policy-section {
            margin: 20px 0;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1><i class="fas fa-truck"></i> Shipping Policy</h1>
        </div>
        <div class="policy-section">
            <p>Our services are digital and delivered instantly to your Instagram account. No physical shipping is involved. Delivery times vary by service:</p>
            <ul>
                <li>Followers: 5-10 minutes</li>
                <li>Likes: 10-15 minutes</li>
                <li>Blue Tick: 24-48 hours</li>
            </ul>
        </div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
