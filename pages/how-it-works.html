<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How It Works - Instagram Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .page-header h1 {
            color: #0095f6;
        }
        .step {
            display: flex;
            align-items: center;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .step-number {
            width: 50px;
            height: 50px;
            background: #0095f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 20px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1><i class="fas fa-question-circle"></i> How It Works</h1>
        </div>
        <div class="step">
            <div class="step-number">1</div>
            <div><strong>Choose Service</strong> - Select followers, likes, or blue tick verification</div>
        </div>
        <div class="step">
            <div class="step-number">2</div>
            <div><strong>Enter Details</strong> - Provide your Instagram username and payment info</div>
        </div>
        <div class="step">
            <div class="step-number">3</div>
            <div><strong>Pay ₹5</strong> - Instant trail payment to verify your account</div>
        </div>
        <div class="step">
            <div class="step-number">4</div>
            <div><strong>Get Results</strong> - Service delivered within 24 hours</div>
        </div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
