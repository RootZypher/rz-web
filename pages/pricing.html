<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - Instagram Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            color: #0095f6;
        }
        .pricing-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #0095f6;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #0095f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1><i class="fas fa-tags"></i> Pricing</h1>
        </div>
        <div class="pricing-card">
            <span><strong>100 Followers</strong></span>
            <span class="price">₹49</span>
        </div>
        <div class="pricing-card">
            <span><strong>500 Followers</strong></span>
            <span class="price">₹245</span>
        </div>
        <div class="pricing-card">
            <span><strong>1000 Followers</strong></span>
            <span class="price">₹490</span>
        </div>
        <div class="pricing-card">
            <span><strong>Blue Tick (1 Month)</strong></span>
            <span class="price">₹199</span>
        </div>
        <div class="pricing-card">
            <span><strong>500 Likes</strong></span>
            <span class="price">₹195</span>
        </div>
        <div class="pricing-card">
            <span><strong>Combo Pack</strong></span>
            <span class="price">₹199</span>
        </div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
